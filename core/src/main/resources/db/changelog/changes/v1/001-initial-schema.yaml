databaseChangeLog:
  - changeSet:
      id: 001-recipe-core-create-tables
      author: daniil
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: varchar
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar
                  constraints:
                    nullable: false

        - createTable:
            tableName: chats
            columns:
              - column:
                  name: id
                  type: varchar
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar
                  constraints:
                    nullable: false

        - createTable:
            tableName: chats_users
            columns:
              - column:
                  name: chat_id
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: varchar
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: chats_users
            columnNames: chat_id, user_id
            constraintName: pk_chatsUsers_chat_id_user_id
        - addForeignKeyConstraint:
            baseTableName: chats_users
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            constraintName: fk_chatsUsers_chat_id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: chats_users
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_chatsUsers_user_id
            onDelete: CASCADE

  - changeSet:
      id: 002-recipe-core-create-tables
      author: daniil
      changes:
        - createTable:
            tableName: recipes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: title
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: chat_id
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: varchar
                  constraints:
                    nullable: false

        - createTable:
            tableName: recipes_categories
            columns:
              - column:
                  name: recipe_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: categories
                  type: varchar
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: recipes_categories
            columnNames: recipe_id, categories
            constraintName: pk_recipes_categories
        - addForeignKeyConstraint:
            baseTableName: recipes_categories
            baseColumnNames: recipe_id
            referencedTableName: recipes
            referencedColumnNames: id
            constraintName: fk_recipes_categories_recipe_id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: recipes
            baseColumnNames: chat_id
            constraintName: fk_recipes_chat_id
            referencedTableName: chats
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: recipes
            baseColumnNames: user_id
            constraintName: fk_recipes_user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE

        - addUniqueConstraint:
            tableName: recipes
            columnNames: chat_id, title
            constraintName: uq_recipes_chat_id_title