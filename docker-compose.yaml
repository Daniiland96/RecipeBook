services:
  recipe-core-db:
    image: postgres:16.1
    container_name: postgres-recipe-core-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=recipe_book
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=recipe_book
    healthcheck:
      test: pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 5s
      retries: 10
